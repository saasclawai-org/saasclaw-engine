name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saasclaw
          POSTGRES_PASSWORD: saasclaw
          POSTGRES_DB: saasclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: saasclaw_engine.test_settings
      DATABASE_URL: postgres://saasclaw:saasclaw@localhost:5432/saasclaw_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-django

      - name: Ruff F821/F4xx check
        run: ruff check --select=F821,F4 --no-cache saasclaw_engine/

      - name: Run tests
        run: python -m pytest --tb=short -q